<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expanded Econ Frontier Tracker</title>
  <meta name="description" content="经济学顶刊与 field top 期刊的主题论文追踪">
  <link rel="stylesheet" href="assets/css/site.css">
  <script src="assets/js/econ-app.js" defer></script>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="hero-kicker">Expanded Econ Frontier</p>
      <h1>国际贸易 · 国际经济 · 产业与创新</h1>
      <p class="hero-subtitle">
        覆盖经济学顶刊和 field top 期刊，聚焦国际贸易、产业经济、企业创新、医药产业与医疗创新。
      </p>
      <div class="hero-meta">
        <span id="update-time">加载中...</span>
        <button id="refresh-btn" type="button">刷新数据</button>
        <a href="standalone-econ-frontier-tracker/data/econ_tracker.json" target="_blank" rel="noopener">查看原始 JSON</a>
        <a href="./index.html">返回政策追踪页</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <label class="control">
        <span>主题</span>
        <select id="topic-filter">
          <option value="">全部主题</option>
        </select>
      </label>

      <label class="control">
        <span>期刊</span>
        <select id="journal-filter">
          <option value="">全部期刊</option>
        </select>
      </label>

      <label class="control control-search">
        <span>关键词</span>
        <input id="search-input" type="search" placeholder="例如 trade / innovation / pharma">
      </label>
    </section>

    <section id="summary-cards" class="summary-cards" aria-live="polite"></section>
    <section id="error-box" class="error-box" hidden></section>
    <section id="journal-list" class="journal-list" aria-live="polite"></section>
  </main>
</body>
</html>
